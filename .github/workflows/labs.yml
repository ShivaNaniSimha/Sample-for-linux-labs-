name: Multi-Lab Build on EC2 (Versioned Build)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and build changed labs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            set -e

            echo "Connecting to EC2..."

            cd ~/Sample-for-linux-labs-

            echo "Pulling latest code..."
            git pull origin main

            echo "Detecting changed files..."

            CHANGED=$(git diff --name-only HEAD~1 HEAD || true)

            if [ -z "$CHANGED" ]; then
              echo "No changes detected"
              exit 0
            fi

            LABS=$(echo "$CHANGED" \
              | cut -d/ -f1 \
              | grep -v "^\.github$" \
              | sort -u)

            echo "Changed labs:"
            echo "$LABS"

            # Git commit SHA for versioning
            VERSION=$(git rev-parse --short HEAD)

            echo "Version tag: $VERSION"

            for LAB in $LABS
            do
              if [ -f "$LAB/Dockerfile" ]; then

                echo "Building image for $LAB"

                # Build versioned image
                docker build \
                  -t $LAB:$VERSION \
                  ./$LAB

                # Tag as latest
                docker tag \
                  $LAB:$VERSION \
                  $LAB:latest

              else
                echo "Skipping $LAB (no Dockerfile)"
              fi
            done

            echo "Build process completed"
