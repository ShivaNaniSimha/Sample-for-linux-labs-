name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            set -e

            cd ~/Sample-for-linux-labs-

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "Building Docker image..."
            docker build -t simple-cicd-app:new .

            echo "Stopping old container..."
            docker stop simple-app || true

            echo "Renaming old container..."
            docker rename simple-app simple-app-backup || true

            echo "Starting new container..."
            if docker run -d \
                --name simple-app \
                -p 3000:3000 \
                --restart unless-stopped \
                simple-cicd-app:new
            then
                echo "Deployment Successful"

                docker rm -f simple-app-backup || true

                docker tag simple-cicd-app:new simple-cicd-app:latest

            else
                echo "Deployment Failed"

                docker rm -f simple-app || true

                docker rename simple-app-backup simple-app || true

                docker start simple-app

                exit 1
            fi
