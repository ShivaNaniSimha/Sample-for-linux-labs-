name: Multi-Lab Conditional Build

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      labs: ${{ steps.set.outputs.labs }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed labs
        id: set
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD || true)

          if [ -z "$CHANGED" ]; then
            echo "labs=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          LABS=$(echo "$CHANGED" \
            | cut -d/ -f1 \
            | sort -u \
            | jq -R -s -c 'split("\n")[:-1]')

          echo "labs=$LABS" >> $GITHUB_OUTPUT

  build:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lab: ${{ fromJson(needs.detect.outputs.labs) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build lab image
        run: |
          if [ ! -d "${{ matrix.lab }}" ]; then
            echo "Skipping: not a directory"
            exit 0
          fi

          if [ ! -f "${{ matrix.lab }}/docker-compose.yml" ]; then
            echo "Skipping: no docker-compose.yml"
            exit 0
          fi

          echo "Building: ${{ matrix.lab }}"
          docker build -t ${{ matrix.lab }}:v${{ github.run_number }} ./${{ matrix.lab }}
